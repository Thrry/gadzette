name: Deploy WordPress theme

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-theme.yml"
      - "wp-content/themes/gadzette/**"
  workflow_dispatch:

concurrency:
  group: gadzette-theme-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy theme to production
    runs-on: ubuntu-latest
    environment: production
    env:
      THEME_DIR: wp-content/themes/gadzette
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate theme files
        run: |
          test -f "$THEME_DIR/style.css"
          test -f "$THEME_DIR/theme.json"
          test -f "$THEME_DIR/templates/home.html"
          python3 -m json.tool "$THEME_DIR/theme.json" >/dev/null

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || { echo "Missing DEPLOY_HOST"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "Missing DEPLOY_USER"; exit 1; }
          test -n "$DEPLOY_PATH" || { echo "Missing DEPLOY_PATH"; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "Missing DEPLOY_SSH_KEY"; exit 1; }
          echo "DEPLOY_PORT=${DEPLOY_PORT:-22}" >> "$GITHUB_ENV"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Backup existing remote theme
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'sh -s' -- "$DEPLOY_PATH" <<'REMOTE'
          set -eu
          deploy_path="$1"
          parent_dir="$(dirname "$deploy_path")"
          theme_dir="$(basename "$deploy_path")"

          if [ -d "$deploy_path" ]; then
            tar -C "$parent_dir" -czf "$parent_dir/gadzette-backup-$(date +%Y%m%d%H%M%S).tgz" "$theme_dir"
          fi
          REMOTE

      - name: Deploy theme
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            "$THEME_DIR/" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Verify remote theme
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "test -f '$DEPLOY_PATH/style.css' && test -f '$DEPLOY_PATH/theme.json' && test -f '$DEPLOY_PATH/templates/home.html'"
